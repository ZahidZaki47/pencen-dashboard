name: Auto-Retry Deploy

# Self-healing: GitHub Pages kadang-kadang gagal dengan ralat sementara
# "Deployment failed, try again later" — penawarnya sentiasa rerun.
# Workflow ini rerun secara AUTOMATIK (maksimum 3 percubaan) setiap kali
# "Deploy Pages" gagal. Dipasang oleh audit Fable 5, 4 Jul 2026.

on:
  workflow_run:
    workflows: ["Deploy Pages"]
    types: [completed]

permissions:
  actions: write

jobs:
  retry:
    if: >
      github.event.workflow_run.conclusion == 'failure' &&
      github.event.workflow_run.run_attempt < 3
    runs-on: ubuntu-latest
    steps:
      - name: Rerun deploy yang gagal
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "Deploy gagal (percubaan ${{ github.event.workflow_run.run_attempt }}) — rerun automatik..."
          gh run rerun ${{ github.event.workflow_run.id }} --repo ${{ github.repository }}
